<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
        }

        .card {
            width: 278px;
            height: 160px;
            border-radius: 10px;
            overflow: hidden;  /* 튀어나오는부분 자르기 */
            margin-top: 16px;
            margin-left: 16px;
            position: relative;
        }

        .card img {
            width: 278px;
            height: 120px;
            object-fit: cover;
        }

        .text {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: #ca785c;
            color : white;
            font-weight: 700;

            display: flex;
            align-items: center;
            padding-left: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/05_mission/image/10d3b623470d38c14c6543d51273e9fd28a9fd7d.jpg" alt="이미지">
        <div class="text">
            안녕하세요!
        </div>
    </div>
</body>
</html>
