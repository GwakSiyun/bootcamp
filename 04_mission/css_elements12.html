<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    body {
        margin: 0;
        padding: 20px;
    }

    .card {
        height: 320px;
        width: 320px;
        margin-top: 16px;
        margin-left: 16px;
        position: relative; /* 기준 */
    }

    .card img {
        width: 320px;
        height: 320px;
        object-fit: cover;
    }

    .text {
        position: absolute;   /* 이미지 위로 */
        top: 12px;
        left: 12px;
        color: white;
        font-size: 18px;
        font-weight: bold;
    }

    .circle1, .circle2, .circle3 {
        position: absolute;
        width: 32px;
        height: 32px;
        border-radius: 50%;
    }

    .circle1 {
        background-color: #E3FF92;
        top: 12px;
        right: 12px;
        
    }
    .circle2 {
        background-color: #92F8FF;
        top: 272px;
        left: 16px;
    }
    .circle3 {
        background-color: #FF9292;
        top: 272px;
        right: 12px;

    }

</style>
</head>
<body>
    <div class="card">
        <img src="/04_mission/image/ae952014cdd66cc9657b0dc753deb0628a21778a.jpg" alt="이미지">
        <div class="text">
            인테리어 디자인
        </div>
        <div class="circle1"></div>
        <div class="circle2"></div>
        <div class="circle3"></div>
    </div>
</body>
</html>
