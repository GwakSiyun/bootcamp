<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.box1 {
    width: 250px;
    border: 1px solid #FFB9B9;
    border-radius: 10px;
    overflow: hidden;
}

.box2 {
    height: 150px;
    background-color: #FFB9B9;
}

.text {
    padding: 12px;
}

.profile {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px;
}

.circle {
    background-color: #D9D9D9;
    height: 24px;
    width: 24px;
    border-radius: 50%;
}
</style>
</head>
<body>
    <div class="box1">
        <div class="box2"></div>
        <div class="text">안녕하세요. 텍스트입니다.</div>
        <div class="profile">
            <div class="circle"></div>
            <div class="name">휴양죠</div>
        </div>
    </div>
</body>
</html>
