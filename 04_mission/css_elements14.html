<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
        width: 120px;
        height: 170px;
        background-color: #FFB9B9;
        border-radius: 10px;
        position: relative; 
        }

        .circle {
        width: 24px;
        height: 24px;
        background-color: #D9D9D9;
        border-radius: 50%;

        position: absolute;
        bottom: 10px;
        right: 10px;
        }

        .text {
        width: 102px;
        margin-top: 8px;
        font-size: 12px;
        font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="circle"></div>
    </div>
    <div class="text">나른한 점심시간, 밖에서 밥 먹기</div>
</body>
</html>
