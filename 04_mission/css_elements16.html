<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    .box{
    width:336px;
    height:148px;
    border:1px solid #C3C3C3;
    border-radius:10px;
    padding:20px;
    }

    .text{
    font-size:16px;
    margin-bottom:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight: 400;
    }

    .login{
    width: 288px;
    height: 48px;
    margin: 0 auto;
    background:#17B75E;
    border-radius:10px;
    display: flex;
    justify-content: center;
    align-items: center;

    color:white;
    font-size:20px;
    font-weight:700;

    margin-bottom:12px;
    }

    .links{
    text-align:center;
    font-size:14px;
    }

</style>
</head>
<body>
    <div class="box">
        <div class="text">사이트를 더 안전하고 편리하게 이용하세요.</div>
        <div class="login">로그인</div>
        <div class="links">
        아이디 찾기 | 비밀번호 찾기 | 회원가입
        </div>
    </div>
</body>
</html>
