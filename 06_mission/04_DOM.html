<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>querySelector 예제</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
    }

    .container {
        border: 2px solid #ddd;
        padding: 20px;
        margin: 15px 0;
        border-radius: 8px;
    }

    .box {
        padding: 10px;
        margin: 8px 0;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
    }

    .special {
        background-color: #fff3cd;
        border-color: #ffeaa7;
    }

    ul li {
        padding: 5px;
        margin: 3px 0;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 14px;
    }

    button:hover {
        background-color: #0056b3;
    }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title">제목 영역</h2>
            <p class="box">첫 번째 박스</p>
            <p class="special box">두 번째 박스 (특별)</p>
            <p class="box">세 번째 박스</p>
    </div>

    <div class="container">
        <ul>
            <li>첫 번째 목록</li>
            <li class="special">두 번째 목록 (특별)</li>
            <li>첫 번째 목록</li>
            <li>첫 번째 목록</li>
        </ul>
    </div>

    <div class="container">
        <input type="text" placeholder="텍스트 입력">
        <input type="email" placeholder="이메일 입력">
        <button type="button">일반 버튼</button>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="selectById()">ID로 선택</button>
        <button onclick="selectByClass()">클래스로 선택</button>
        <button onclick="selectByTag()">태그로 선택</button>
        <button onclick="selectSpecial()">특별 클래스 선택</button>
        <button onclick="selectFirst()">첫 번째만 선택</button>
        <button onclick="selectAll()">모든 박스 선택</button>
        <button onclick="selectComplex()">복합 선택자</button>
        <button onclick="selectInput()">입력필드 선택</button>
    </div>

    <script>
        function selectById() {
            var title = document.querySelector("#title");
            title.innerHTML = "ID로 선택된 제목!";
            title.style.color = "#dc3545";
        }
        
        function selectByClass() {
            var box = document.querySelector(".box");
            box.innerHTML = "클래스로 선택된 첫 번째 박스!"
            box.style.backgroundColor = "#d4edda";
        }

        function selectByTag() {
            var P = document.querySelector("p");
            P.innerHTML = "태그로 선택된 첫 번째 박스!";
            P.style.border = "2px solid #007bff";
        }

        function selectSpecial() {
            var specialElements = document.querySelectorAll(".special");

            for (var i = 0; i < specialElements.length; i++) {
            specialElements[i].innerHTML = "특별 클래스 " + (i + 1) + "번!";
            specialElements[i].style.fontWeight = "bold";
            specialElements[i].style.color = "#856404";
            }
        }

        function selectFirst() {
            var firstBox = document.querySelector(".container .box");
            firstBox.innerHTML = "첫 번째 컨테이너의 첫 번째 박스!"
            firstBox.
            style.backgroundColor = "#cce5ff";
        }

        function selectAll () {
            var allBoxes = document.querySelectorAll(".box");
            
            for (var i = 0; i < allBoxes.length; i++) {
            allBoxes[i].textContent = "모든 박스 " + (i + 1) + "번 변경!";
            allBoxes[i].style.backgroundColor = "#ffccff";
            }
        }

        function selectComplex() {
            var complexSelect = document.querySelectorAll(
                ".container p.box:not(.special)"
            )
        
            for (var i = 0; i<complexSelect.length; i++) {
                complexSelect[i].innerHTML = "복합 선택자로 선택됨!"
                complexSelect[i].style.backgroundColor = "#ccffcc";
                complexSelect[i].style.border = "2px dashed #28a745";
            }
        }

        function selectInput() {
            var textInput = document.querySelector('input[type="text"]');
            var emailInput = document.querySelector('input[type="email"]');
            
            textInput.value = "querySelector로 설정된 값";
            textInput.style.backgroundColor = "#fff3cd";

            emailInput.value = "test@example.com";
            emailInput.style.backgroundColor = "#d1ecf1";
        }
    </script>
</body>
</html>
